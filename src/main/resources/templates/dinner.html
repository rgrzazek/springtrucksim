<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <title>Recipes</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <style>
    .tonights-pick {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: var(--chrome);
      color: var(--bg);
      padding: 1rem 1.5rem;
      text-decoration: none;
      margin-bottom: 2rem;
    }

    .tonights-pick:hover {
      background: #2e4d3f;
    }

    .tonights-pick-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      opacity: 0.6;
      flex-shrink: 0;
    }

    .tonights-pick-title {
      font-size: 1.1rem;
      font-weight: bold;
    }

    .tonights-pick-arrow {
      margin-left: auto;
      font-size: 1.2rem;
      color: var(--accent);
    }

    .chip-filter {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin: 1.5rem 0;
    }

    .chip {
      padding: 0.35rem 0.85rem;
      border: 2px solid var(--chrome);
      background: white;
      color: var(--chrome);
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.9rem;
      user-select: none;
    }

    .chip.selected {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }
  </style>
</head>

<body>
  <div th:insert="~{fragments/header :: header}"></div>
  <header th:insert="~{fragments/nav :: nav}"></header>

  <main>
    <a class="tonights-pick" th:href="@{/dinner/{slug}(slug=${tonightsRecipe.slug})}">
      <span class="tonights-pick-label">Tonight's Pick</span>
      <span class="tonights-pick-title" th:text="${tonightsRecipe.title}"></span>
      <span class="tonights-pick-arrow">→</span>
    </a>

    <h1>Recipes</h1>
    <div class="chip-filter">
      <button class="chip" th:each="name : ${ingredientNames}" th:text="${name}" th:attr="data-name=${name}">
      </button>
    </div>
    <form id="ai-form" th:action="@{/dinner/ai-recipe}" method="post" style="display:none; margin-bottom: 1.5rem;">
      <div id="ai-inputs"></div>
      <button type="submit" class="chip selected">Don't see anything you like? Ask AI</button>
    </form>

    <section class="project-grid">
      <a class="project-card" th:each="recipe : ${recipes}" th:href="@{/dinner/{slug}(slug=${recipe.slug})}"
        th:attr="data-ingredients=${recipe.ingredientNames}">
        <h2 th:text="${recipe.title}"></h2>
      </a>
    </section>
  </main>

  <script>
    const chips = document.querySelectorAll('.chip[data-name]');
    const cards = document.querySelectorAll('.project-card');
    const aiForm = document.getElementById('ai-form');
    const aiInputs = document.getElementById('ai-inputs');
    const selected = new Set();

    chips.forEach(chip => {
      chip.addEventListener('click', () => {
        const name = chip.dataset.name;
        chip.classList.toggle('selected');
        selected.has(name) ? selected.delete(name) : selected.add(name);
        filter();
      });
    });

    function filter() {
      cards.forEach(card => {
        if (selected.size === 0) { card.style.display = ''; return; }
        const ingredients = new Set(card.dataset.ingredients.split(','));
        card.style.display = [...selected].every(s => ingredients.has(s)) ? '' : 'none';
      });

      aiInputs.innerHTML = [...selected]
        .map(s => `<input type="hidden" name="ingredients" value="${s}">`)
        .join('');
      aiForm.style.display = selected.size > 0 ? '' : 'none';
    }
  </script>

</body>

</html>
