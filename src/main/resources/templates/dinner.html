<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <title>Recipes</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <style>
    .chip-filter {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin: 1.5rem 0;
    }

    .chip {
      padding: 0.35rem 0.85rem;
      border: 2px solid var(--chrome);
      background: white;
      color: var(--chrome);
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.9rem;
      user-select: none;
    }

    .chip.selected {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }
  </style>
</head>

<body>
  <div th:insert="~{fragments/header :: header}"></div>
  <header th:insert="~{fragments/nav :: nav}"></header>

  <main>
    <h1>Recipes</h1>
    <div class="chip-filter">
      <button class="chip"
              th:each="name : ${ingredientNames}"
              th:text="${name}"
              th:attr="data-name=${name}">
      </button>
    </div>
    <section class="project-grid">
      <a class="project-card"
         th:each="recipe : ${recipes}"
         th:href="@{/dinner/{slug}(slug=${recipe.slug})}"
         th:attr="data-ingredients=${recipe.ingredientNames}">
        <h2 th:text="${recipe.title}"></h2>
      </a>
    </section>
  </main>

  <script>
    const chips = document.querySelectorAll('.chip');
    const cards = document.querySelectorAll('.project-card');
    const selected = new Set();

    chips.forEach(chip => {
      chip.addEventListener('click', () => {
        const name = chip.dataset.name;
        chip.classList.toggle('selected');
        selected.has(name) ? selected.delete(name) : selected.add(name);
        filter();
      });
    });

    function filter() {
      cards.forEach(card => {
        if (selected.size === 0) { card.style.display = ''; return; }
        const ingredients = new Set(card.dataset.ingredients.split(','));
        card.style.display = [...selected].every(s => ingredients.has(s)) ? '' : 'none';
      });
    }
  </script>

</body>

</html>
