<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <title>Recipes</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <style>
    .recipe-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-top: 1.5rem;
    }

    .recipe-list a {
      display: block;
      padding: 1rem 1.25rem;
      background: white;
      border-left: 4px solid var(--accent);
      text-decoration: none;
      color: var(--chrome);
      font-size: 1.1rem;
    }

    .recipe-list a:hover {
      border-left-color: var(--chrome);
    }
  </style>
</head>

<body>
  <div th:insert="~{fragments/header :: header}"></div>
  <header th:insert="~{fragments/nav :: nav}"></header>

  <main>
    <h1>Recipes</h1>
    <nav class="recipe-list">
      <a th:each="recipe : ${recipes}"
         th:href="@{/dinner/{slug}(slug=${recipe.slug})}"
         th:text="${recipe.title}">
      </a>
    </nav>
  </main>

</body>

</html>
