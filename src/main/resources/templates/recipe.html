<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <title th:text="${recipe.title}">Recipe</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <style>
    body {
      overflow: hidden;
    }

    main {
      padding: 0;
      height: calc(100dvh - var(--header-height));
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
    }

    @media (max-width: 640px) {
      main {
        height: calc(100dvh - var(--header-height) - var(--nav-mobile-height));
      }
    }

    .recipe-section {
      height: 100%;
      scroll-snap-align: start;
      padding: 1.5rem 2rem;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    .recipe-section h1 {
      margin: 0 0 1.25rem 0;
      font-size: 1.4rem;
      color: var(--chrome);
    }

    .ingredients-list {
      list-style: none;
      padding: 0;
      margin: 0;
      font-size: 1.75rem;
      line-height: 1.6;
    }

    .ingredients-list li {
      padding: 0.5rem 0;
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
    }

    .section-method {
      background: white;
    }

    .method-list {
      list-style: none;
      padding: 0;
      margin: 0;
      font-size: 1.1rem;
      line-height: 1.8;
      counter-reset: step;
    }

    .method-list li {
      counter-increment: step;
      padding: 0.5rem 0;
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
    }

    .method-list li::before {
      content: counter(step) ". ";
      color: var(--accent);
      font-weight: bold;
    }

    .done {
      text-decoration: line-through;
      opacity: 0.4;
    }

    .back-to-recipes {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: var(--chrome);
      color: var(--bg);
      padding: 1rem 1.5rem;
      text-decoration: none;
      margin: -1.5rem -2rem 1.5rem -2rem;
    }

    .back-to-recipes:hover {
      background: #2e4d3f;
    }

    .scroll-hint {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 12rem;
      overflow: hidden;
      pointer-events: none;
      user-select: none;
    }

    .scroll-hint::before {
      content: '↓';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      font-size: 20rem;
      line-height: 1;
      text-align: center;
      color: var(--chrome);
      opacity: 0.15;
    }
  </style>
</head>

<body>
  <div th:insert="~{fragments/header :: header}"></div>
  <header th:insert="~{fragments/nav :: nav}"></header>

  <main>
    <section class="recipe-section section-ingredients">
      <a class="back-to-recipes" th:href="@{/dinner}">← All Recipes</a>
      <h1 th:text="${recipe.title}">Recipe Title</h1>
      <ul class="ingredients-list">
        <li th:each="ingredient : ${recipe.ingredients}" th:text="${ingredient.display}"></li>
      </ul>
      <div class="scroll-hint"></div>

    </section>

    <section class="recipe-section section-method">
      <h1 th:text="${recipe.title}">Recipe Title</h1>
      <ol class="method-list">
        <li th:each="step : ${recipe.method}" th:text="${step}"></li>
      </ol>
    </section>
  </main>
  <script>
    document.querySelectorAll('.ingredients-list li, .method-list li').forEach(li => {
      li.addEventListener('click', () => li.classList.toggle('done'));
    });
  </script>

</body>

</html>
