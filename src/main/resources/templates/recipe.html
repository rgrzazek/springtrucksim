<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <title th:text="${recipe.title}">Recipe</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <link rel="stylesheet" th:href="@{/css/dinner.css}">
  <style>
    body {
      overflow: hidden;
    }

    main {
      padding: 0;
      height: calc(100dvh - var(--header-height));
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
    }

    @media (max-width: 640px) {
      main {
        height: calc(100dvh - var(--header-height) - var(--nav-mobile-height));
      }
    }

    .recipe-section {
      height: 100%;
      scroll-snap-align: start;
      padding: 1.5rem 2rem;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    .recipe-section h1 {
      margin: 0 0 0.35rem 0;
      font-size: 1.4rem;
      color: var(--chrome);
    }

    .ingredients-list {
      list-style: none;
      padding: 0;
      margin: 0;
      font-size: 1.75rem;
      line-height: 1.6;
    }

    .ingredients-list li {
      padding: 0.5rem 0;
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
    }

    .section-method {
      background: white;
    }

    .method-list {
      list-style: none;
      padding: 0;
      margin: 0;
      font-size: 1.1rem;
      line-height: 1.8;
      counter-reset: step;
    }

    .method-list li {
      counter-increment: step;
      padding: 0.5rem 0;
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
    }

    .method-list li::before {
      content: counter(step) ". ";
      color: var(--accent);
      font-weight: bold;
    }

    .done {
      text-decoration: line-through;
      opacity: 0.4;
    }

    .back-to-recipes {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: var(--chrome);
      color: var(--bg);
      padding: 1rem 1.5rem;
      text-decoration: none;
      margin: -1.5rem -2rem 1.5rem -2rem;
    }

    .back-to-recipes:hover {
      background: #2e4d3f;
    }

    .ai-preview-bar {
      margin: auto -2rem -1.5rem;
      padding: 0.75rem 2rem;
      background: white;
      border-top: 2px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      font-size: 0.85rem;
      color: var(--chrome);
      flex-shrink: 0;
    }

    .ai-preview-bar span {
      opacity: 0.6;
    }

    .ai-preview-bar span.save-error {
      opacity: 1;
      color: var(--accent);
      font-weight: bold;
    }

    .save-btn {
      padding: 0.4rem 1.1rem;
      background: var(--accent);
      color: white;
      border: none;
      cursor: pointer;
      font-size: 0.85rem;
      font-family: inherit;
      font-weight: bold;
      white-space: nowrap;
    }

    .save-btn:hover {
      opacity: 0.85;
    }

    .scroll-hint {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 12rem;
      overflow: hidden;
      pointer-events: none;
      user-select: none;
    }

    .scroll-hint::before {
      content: '↓';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      font-size: 20rem;
      line-height: 1;
      text-align: center;
      color: var(--chrome);
      opacity: 0.15;
    }
  </style>
</head>

<body>
  <div th:insert="~{fragments/header :: header}"></div>
  <header th:insert="~{fragments/nav :: nav}"></header>

  <main>
    <section class="recipe-section section-ingredients">
      <a class="back-to-recipes" th:href="@{/dinner}">← All Recipes</a>
      <h1 th:text="${recipe.title}">Recipe Title</h1>

      <span th:if="${recipe.source != null}" class="source-badge"
            th:classappend="${recipe.source.name() == 'SUBMITTED'} ? ' contributed' : ' house'"
            th:text="${recipe.source.name() == 'SUBMITTED'} ? 'Contributed' : 'House'">
      </span>

      <ul class="ingredients-list">
        <li th:each="ingredient : ${recipe.ingredients}" th:text="${ingredient.display}"></li>
      </ul>

      <div th:if="${isPreview}" class="ai-preview-bar">
        <span id="save-status">AI-generated — not saved yet</span>
        <form th:action="@{/dinner/submit}" method="post" id="save-form" style="display:contents;">
          <input type="hidden" name="token" th:value="${token}">
          <button type="submit" class="save-btn">Save this recipe →</button>
        </form>
      </div>

      <div class="scroll-hint"></div>
    </section>

    <section class="recipe-section section-method">
      <h1 th:text="${recipe.title}">Recipe Title</h1>
      <ol class="method-list">
        <li th:each="step : ${recipe.method}" th:text="${step}"></li>
      </ol>
    </section>
  </main>

  <script>
    document.querySelectorAll('.ingredients-list li, .method-list li').forEach(li => {
      li.addEventListener('click', () => li.classList.toggle('done'));
    });

    const saveForm = document.getElementById('save-form');
    saveForm?.addEventListener('submit', async e => {
      e.preventDefault();
      const btn = saveForm.querySelector('[type=submit]');
      const status = document.getElementById('save-status');
      btn.disabled = true;
      btn.textContent = 'Saving…';
      status.classList.remove('save-error');
      try {
        const response = await fetch(saveForm.action, {
          method: 'POST',
          body: new URLSearchParams(new FormData(saveForm)),
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
        });
        const data = await response.json();
        if (response.ok) {
          window.location.href = data.redirect;
          return;
        }
        status.textContent = data.error;
      } catch {
        status.textContent = 'Something went wrong. Try again.';
      }
      status.classList.add('save-error');
      btn.disabled = false;
      btn.textContent = 'Save this recipe →';
    });
  </script>

</body>

</html>
